<div class="progress">
    <div class="wrapper">
        <div id="toc-scroll-wrapper"
            style="max-height: 300px; overflow-y: scroll; overflow-x: hidden; padding-right: 8px;">
            {{ .TableOfContents }}
        </div>
    </div>
</div>
<style>
    #toc-scroll-wrapper::-webkit-scrollbar {
        width: 8px;
    }

    #toc-scroll-wrapper::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
    }

    #toc-scroll-wrapper::-webkit-scrollbar-thumb {
        background: #778ba5;
        border-radius: 4px;
    }

    #toc-scroll-wrapper::-webkit-scrollbar-thumb:hover {
        background: #4881cd;
    }

    #toc-scroll-wrapper {
        scrollbar-width: thin;
        scrollbar-color: #778ba5 #f1f1f1;
    }
</style>
